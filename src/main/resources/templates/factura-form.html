<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Factura</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-4">
<div th:replace="~{navbar :: navbar}"></div>
<div class="card border-0 shadow-lg rounded-4 mx-auto" style="max-width: 900px;">
    <div class="card-header bg-primary text-white py-4 px-4">
        <h2 class="fw-bold mb-1">Nueva Factura Manual</h2>
        <small class="opacity-75">Ingrese los parámetros de facturación y complete los datos de pago si corresponde</small>
    </div>

    <div class="card-body p-4">
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <form th:action="@{/facturas/guardar}" th:object="${factura}" method="post" class="row g-3">
            <input type="hidden" th:field="*{id}" />

            <h5 class="fw-bold text-secondary border-bottom pb-2 mb-3">1. Datos del Comprobante</h5>
            
            <div class="col-md-6">
                <label class="form-label fw-semibold">Vincular Contrato de Alquiler (*)</label>
                <select th:field="*{contrato}" class="form-select" required>
                    <option value="">-- Seleccione un Contrato Activo --</option>
                    <option th:each="con : ${contratos}" 
                            th:value="${con.id}" 
                            th:text="'Contrato #' + ${con.id} + ' - Inquilino: ' + ${con.inquilino.nombre}"></option>
                </select>
            </div>

            <div class="col-md-6">
                <label class="form-label fw-semibold">Concepto Facturado (*)</label>
                <input type="text" th:field="*{conceptoFacturado}" class="form-control" placeholder="Ej: Alquiler Julio 2026" required/>
            </div>

            <div class="col-md-4">
                <label class="form-label fw-semibold">Fecha de Emisión (*)</label>
                <input type="date" th:field="*{fechaEmision}" class="form-control" required/>
            </div>

            <div class="col-md-4">
                <label class="form-label fw-semibold">Fecha de Vencimiento (*)</label>
                <input type="date" th:field="*{fechaVencimiento}" class="form-control" required/>
            </div>

			<div class="col-md-4">
			    <label class="form-label fw-semibold">Importe Base ($) (*)</label>
			    <input type="number" step="0.01" min="0.01" th:field="*{importe}" class="form-control" placeholder="Ej: 250000" required/>
			</div>

            <div class="col-md-12 mt-3">
                <label class="form-label fw-semibold text-muted">Estado Inicial de la Factura:</label>
                <span class="badge bg-warning text-dark fs-6 d-inline-block ms-2 px-3 py-2 fw-bold">PENDIENTE</span>
                <input type="hidden" th:field="*{estado}" />
            </div>
            
            <div class="col-md-4">
                <label class="form-label fw-semibold">Fecha en que Pagó</label>
                <input type="date" th:field="*{fechaPago}" class="form-control" />
            </div>

            <div class="col-md-4">
                <label class="form-label fw-semibold">Medio de Pago</label>
                <select th:field="*{medioPago}" class="form-select">
                    <option value="">-- Sin Registrar Pago --</option>
                    <option th:each="mp : ${mediosPago}" th:value="${mp}" th:text="${mp}"></option>
                </select>
            </div>

			<div class="col-md-4">
			    <label class="form-label fw-semibold">Importe Pagado Real ($)</label>
			    <input type="number" step="0.01" min="0.00" th:field="*{importePagado}" class="form-control" placeholder="Monto abonado" />
			</div>

			<div class="col-md-12">
			    <label class="form-label fw-semibold">Intereses de Mora Pagados ($)</label>
			    <input type="number" step="0.01" min="0.00" th:field="*{interesImporte}" class="form-control" placeholder="Monto de recargo aplicado" />
			</div>

            <div class="col-12 d-flex justify-content-between mt-5">
                <a th:href="@{/facturas}" class="btn btn-outline-secondary px-4">Cancelar</a>
                <button type="submit" class="btn btn-success fw-bold px-4">Confirmar y Guardar</button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
