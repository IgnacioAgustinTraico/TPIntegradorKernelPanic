<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Contrato</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-4">
<div th:replace="~{navbar :: navbar}"></div>
<div class="card border-0 shadow-lg rounded-4">
    <div class="card-header bg-primary text-white py-4 px-4">
        <h2 class="fw-bold mb-1" th:text="${contrato.id == null} ? 'Nuevo Contrato de Alquiler' : 'Modificar Contrato #' + ${contrato.id}"></h2>
        <small class="opacity-75">Defina los parámetros económicos, vinculación de partes y estados del contrato</small>
    </div>

    <div class="card-body p-4">
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <form th:action="@{/contratos/guardar}" th:object="${contrato}" method="post" class="row g-3">
            <input type="hidden" th:field="*{id}" />

            <div class="col-md-6">
                <label class="form-label fw-semibold">Seleccionar Propiedad</label>
                <select th:field="*{propiedad}" class="form-select" th:disabled="${contrato.id != null}" required>
                    <option value="">-- Seleccione un Inmueble --</option>
                    <option th:each="prop : ${propiedades}" 
                            th:value="${prop.id}" 
                            th:text="${prop.direccion} + ' - ' + ${prop.ciudad.nombre}"></option>
                </select>
                <input type="hidden" th:if="${contrato.id != null}" th:field="*{propiedad}" />
            </div>

            <div class="col-md-6">
                <label class="form-label fw-semibold">Asignar Inquilino</label>
                <select th:field="*{inquilino}" class="form-select" required>
                    <option value="">-- Seleccione un Inquilino --</option>
                    <option th:each="inq : ${inquilinos}" 
                            th:value="${inq.id}" 
                            th:text="${inq.nombre}"></option>
                </select>
            </div>

            <div class="col-md-3">
                <label class="form-label fw-semibold">Fecha de Inicio</label>
                <input type="date" th:field="*{fechaInicio}" class="form-control" required/>
            </div>

            <div class="col-md-3">
                <label class="form-label fw-semibold">Duración (Meses)</label>
                <input type="number" th:field="*{duracionMeses}" class="form-control" min="1" placeholder="Ej: 24" required/>
            </div>

            <div class="col-md-3">
                <label class="form-label fw-semibold">Importe Mensual ($)</label>
                <input type="number" step="0.01" th:field="*{importeMensual}" class="form-control" placeholder="Ej: 300000" required/>
            </div>

            <div class="col-md-3">
                <label class="form-label fw-semibold">Día Vencimiento (1 al 31)</label>
                <input type="number" th:field="*{diaVencimientoMensual}" class="form-control" min="1" max="31" placeholder="Ej: 10" required/>
            </div>

            <div class="col-md-8">
                <label class="form-label fw-semibold">Notas / Descripción adicional</label>
                <input type="text" th:field="*{descripcion}" class="form-control" placeholder="Ej: Cláusulas especiales de mantenimiento o co-garantes..." />
            </div>

            <div class="col-md-4">
                <label class="form-label fw-semibold">Estado del Contrato</label>
                <select th:field="*{estado}" class="form-select">
                    <option th:each="est : ${estados}" th:value="${est}" th:text="${est}"></option>
                </select>
            </div>

            <div class="col-12 d-flex justify-content-between mt-4">
                <a th:href="@{/contratos}" class="btn btn-outline-secondary px-4">Cancelar</a>
                <button type="submit" class="btn btn-success fw-bold px-4">Guardar Contrato</button>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
