<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Modificar Factura</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-4">
<div th:replace="~{navbar :: navbar}"></div>
<div class="card border-0 shadow-lg rounded-4 mx-auto" style="max-width: 900px;">
    <div class="card-header bg-warning text-dark py-4 px-4">
        <h2 class="fw-bold mb-1">Modificar Factura / Registrar Pago</h2>
        <small class="opacity-75">Actualice el estado y los datos de conciliación respetando las reglas de negocio</small>
    </div>

    <div class="card-body p-4">
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <form th:action="@{/facturas/guardar}" th:object="${factura}" method="post" class="row g-3">
            <input type="hidden" th:field="*{id}" />
            <input type="hidden" th:field="*{contrato.id}" />
            <input type="hidden" th:field="*{conceptoFacturado}" />
            <input type="hidden" th:field="*{fechaEmision}" />
            <input type="hidden" th:field="*{fechaVencimiento}" />
            <input type="hidden" th:field="*{importe}" />

            <h5 class="fw-bold text-secondary border-bottom pb-2 mb-3">1. Datos del Comprobante (Solo Lectura)</h5>
            
            <div class="col-md-3">
                <label class="form-label fw-semibold text-muted">ID Factura</label>
                <input type="text" class="form-control bg-light" th:value="'#' + *{id}" readonly />
            </div>

            <div class="col-md-9">
                <label class="form-label fw-semibold text-muted">Contrato de Alquiler Asociado</label>
                <input type="text" class="form-control bg-light" 
                       th:value="'Contrato #' + *{contrato.id} + ' - Inquilino: ' + *{contrato.inquilino.nombre}" readonly />
            </div>

            <div class="col-md-6">
                <label class="form-label fw-semibold text-muted">Concepto Facturado</label>
                <input type="text" th:value="*{conceptoFacturado}" class="form-control bg-light" readonly/>
            </div>

            <div class="col-md-3">
                <label class="form-label fw-semibold text-muted">Fecha de Vencimiento</label>
                <input type="date" th:value="*{fechaVencimiento}" class="form-control bg-light" readonly/>
            </div>

            <div class="col-md-3">
                <label class="form-label fw-semibold text-muted">Importe Base ($)</label>
                <input type="text" th:value="'$' + *{importe}" class="form-control bg-light" readonly/>
            </div>

            <div class="col-md-12 mt-4 bg-white p-3 border rounded shadow-sm">
                <label class="form-label fw-bold text-dark">Gestión de Estado del Comprobante (*)</label>
                <select th:field="*{estado}" id="estadoFactura" class="form-select" required>
                    <option th:each="est : ${estadosPermitidos}" 
                            th:value="${est}" 
                            th:text="${est}"></option>
                </select>
            </div>

            <div id="registroCobroSection" class="row g-3 mt-1">
                <h5 class="fw-bold text-secondary border-bottom pb-2 mb-3 mt-4">2. Registro de Cobro / Conciliación</h5>

                <div class="col-md-4">
                    <label class="form-label fw-semibold">Fecha en que Pagó</label>
                    <input type="date" th:field="*{fechaPago}" class="form-control" />
                </div>

                <div class="col-md-4">
                    <label class="form-label fw-semibold">Medio de Pago</label>
                    <select th:field="*{medioPago}" class="form-select">
                        <option value="">-- Sin Registrar Pago --</option>
                        <option th:each="mp : ${mediosPago}" th:value="${mp}" th:text="${mp}"></option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label class="form-label fw-semibold">Importe Pagado Real ($)</label>
                    <input type="number" step="0.01" th:min="*{importe}" th:field="*{importePagado}" class="form-control" placeholder="Monto abonado" />
                </div>

                <div class="col-md-12">
                    <label class="form-label fw-semibold">Intereses de Mora Pagados ($)</label>
                    <input type="number" step="0.01" min="0.00" th:field="*{interesImporte}" class="form-control" placeholder="0.00" />
                </div>
            </div>

            <div class="col-12 d-flex justify-content-between mt-5">
                <a th:href="@{/facturas}" class="btn btn-outline-secondary px-4">Cancelar</a>
                <button type="submit" class="btn btn-warning fw-bold px-4">Actualizar Factura</button>
            </div>
        </form>
    </div>
</div>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const estadoSelect = document.getElementById('estadoFactura');
        const registroCobroSection = document.getElementById('registroCobroSection');

        if (!estadoSelect || !registroCobroSection) {
            return;
        }

        const fechaPago = document.querySelector('input[name="fechaPago"]');
        const medioPago = document.querySelector('select[name="medioPago"]');
        const importePagado = document.querySelector('input[name="importePagado"]');
        const interesImporte = document.querySelector('input[name="interesImporte"]');
        const camposCobro = [fechaPago, medioPago, importePagado, interesImporte].filter(Boolean);

        function actualizarSeccionCobro() {
            const esPagada = estadoSelect.value === 'PAGADA';
            registroCobroSection.style.display = esPagada ? '' : 'none';

            camposCobro.forEach(function (campo) {
                campo.disabled = !esPagada;
                if (!esPagada) {
                    campo.value = '';
                }
            });

            if (fechaPago) {
                fechaPago.required = esPagada;
            }
            if (medioPago) {
                medioPago.required = esPagada;
            }
            if (importePagado) {
                importePagado.required = esPagada;
            }
        }

        estadoSelect.addEventListener('change', actualizarSeccionCobro);
        actualizarSeccionCobro();
    });
</script>
</body>
</html>
