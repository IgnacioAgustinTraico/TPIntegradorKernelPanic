<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Publicación</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-4">
<div class="card border-0 shadow-lg rounded-4">
    <div class="card-header bg-primary text-white py-4 px-4">
        <h2 class="fw-bold mb-1" th:text="${publicacion.id == null} ? 'Nueva Publicación' : 'Modificar Publicación #' + ${publicacion.id}"></h2>
        <small class="opacity-75">Ingrese las condiciones y el precio para publicar el inmueble</small>
    </div>

    <div class="card-body p-4">
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <form th:action="@{/publicaciones/guardar}" th:object="${publicacion}" method="post" class="row g-3">
            <input type="hidden" th:field="*{id}" />

            <div class="col-12">
                <label class="form-label fw-semibold">Seleccionar Propiedad Disponible</label>
                <select th:field="*{propiedad}" class="form-select" th:disabled="${publicacion.id != null}" required>
                    <option value="">-- Seleccione una Propiedad --</option>
                    <option th:each="prop : ${propiedades}" 
                            th:value="${prop.id}" 
                            th:text="${prop.direccion} + ' - ' + ${prop.ciudad.nombre}"></option>
                </select>
                <input type="hidden" th:if="${publicacion.id != null}" th:field="*{propiedad}" />
            </div>

            <div class="col-md-6">
                <label class="form-label fw-semibold">Precio Mensual ($)</label>
                <input type="number" step="0.01" th:field="*{precioMensual}" class="form-control" placeholder="Ej: 250000" required/>
            </div>

            <div class="col-md-6">
                <label class="form-label fw-semibold">Estado Inicial</label>
                <select th:field="*{estado}" class="form-select">
                    <option th:each="est : ${estados}" th:value="${est}" th:text="${est}"></option>
                </select>
            </div>

            <div class="col-md-6">
                <label class="form-label fw-semibold">Fecha de Publicación</label>
                <input type="date" th:field="*{fechaPublicacion}" class="form-control" required/>
            </div>

            <div class="col-12">
                <label class="form-label fw-semibold">Descripción de la propiedad</label>
                <textarea th:field="*{descripcion}" class="form-control" rows="5" placeholder="Ej: Excelente iluminación, ambientes amplios y ubicación estratégica."></textarea>
            </div>

            <div class="col-12">
                <label class="form-label fw-semibold">Condiciones de alquiler</label>
                <textarea th:field="*{condiciones}" class="form-control" rows="5" placeholder="Ej: Depósito, garantía, si acepta mascotas u otras condiciones..."></textarea>
            </div>

            <div class="col-12 d-flex justify-content-between mt-4">
                <a th:href="@{/publicaciones}" class="btn btn-outline-secondary px-4">Cancelar</a>
                <button type="submit" class="btn btn-success fw-bold px-4">Guardar Publicación</button>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
