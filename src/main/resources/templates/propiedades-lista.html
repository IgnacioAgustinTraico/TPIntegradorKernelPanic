<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Propiedades</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-4">
<div th:replace="~{navbar :: navbar}"></div>
<div class="card border-0 shadow-lg rounded-4">
    <div class="card-header bg-primary text-white py-4 px-4">
        <div class="d-flex justify-content-between align-items-center">
            <div>
                <h2 class="fw-bold mb-1">Gestión de Propiedades</h2>
                <small class="opacity-75">Administración completa del catálogo de inmuebles</small>
            </div>
            <a th:href="@{/propiedades/nueva}" class="btn btn-light fw-bold shadow-sm px-4">+ Nueva Propiedad</a>
        </div>
    </div>

    <div class="card-body p-4">
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

        <form th:action="@{/propiedades}" method="get" class="row g-3 mb-4">
            <div class="col-md-3">
                <label class="form-label">Dirección</label>
                <input type="text" name="direccion" class="form-control" th:value="${direccion}">
            </div>
            <div class="col-md-2">
                <label class="form-label">Ciudad</label>
                <input type="text" name="ciudad" class="form-control" th:value="${ciudad}">
            </div>
            <div class="col-md-2">
                <label class="form-label">Tipo</label>
                <select name="tipo" class="form-select">
                    <option value="">Todos</option>
                    <option th:each="tipo : ${tipos}" th:value="${tipo}" th:text="${tipo}" th:selected="${tipoSeleccionado != null and tipoSeleccionado == tipo}"></option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label">Estado</label>
                <select name="estado" class="form-select">
                    <option value="">Todos</option>
                    <option th:each="estado : ${estados}" th:value="${estado}" th:text="${estado}" th:selected="${estadoSeleccionado != null and estadoSeleccionado == estado}"></option>
                </select>
            </div>
            <div class="col-md-3 d-flex align-items-end">
                <button type="submit" class="btn btn-primary me-2">Filtrar</button>
                <a th:href="@{/propiedades}" class="btn btn-outline-secondary">Limpiar</a>
            </div>
        </form>

        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Dirección</th>
                    <th>Ciudad</th>
                    <th>Tipo</th>
                    <th>Ambientes</th>
                    <th>m²</th>
                    <th>Estado</th>
                    <th>Propietario</th>
                    <th class="text-center">Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="propiedad : ${propiedades}">
                    <td class="fw-bold" th:text="${propiedad.id}"></td>
                    <td th:text="${propiedad.direccion}"></td>
                    <td th:text="${propiedad.ciudad != null ? propiedad.ciudad.nombre : '-'}"></td>
                    <td><span class="badge bg-secondary px-3 py-2" th:text="${propiedad.tipo}"></span></td>
                    <td th:text="${propiedad.cantidadAmbientes}"></td>
                    <td th:text="${propiedad.metrosCuadrados}"></td>
                    <td>
                        <span class="badge px-3 py-2"
                              th:classappend="${propiedad.estadoDisponibilidad.name()=='DISPONIBLE'} ? ' bg-success' : (${propiedad.estadoDisponibilidad.name()=='RESERVADA'} ? ' bg-warning text-dark' : (${propiedad.estadoDisponibilidad.name()=='ALQUILADA'} ? ' bg-danger' : ' bg-secondary'))"
                              th:text="${propiedad.estadoDisponibilidad}"></span>
                    </td>
                    <td th:text="${propiedad.propietario != null ? propiedad.propietario.nombre : '-'}"></td>
                    <td class="text-center">
                        <a th:href="@{/propiedades/editar/{id}(id=${propiedad.id})}" class="btn btn-warning btn-sm me-2 shadow-sm">Editar</a>
                        <a th:href="@{/propiedades/eliminar/{id}(id=${propiedad.id})}" class="btn btn-danger btn-sm shadow-sm" onclick="return confirm('¿Está seguro de eliminar esta propiedad?');">Eliminar</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(propiedades)}">
                    <td colspan="9" class="text-center py-5">
                        <div class="text-secondary">
                            <h5>No hay propiedades registradas</h5>
                            <small>Presione "Nueva Propiedad" para comenzar.</small>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
